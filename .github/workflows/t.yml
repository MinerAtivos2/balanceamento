name: t

on:
  schedule:
    # Executa todos os dias úteis às 23:00 UTC (20:00 BRT), após fechamento da B3
    - cron: '0 23 * * 1-5'
  workflow_dispatch:  # Permite execução manual

permissions:
  contents: write

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas
      
      - name: t
        run: python scripts/manage_users.py add admin teste
      
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/app.db
          git commit -m "Update app.db - $(date +'%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"
          git push
