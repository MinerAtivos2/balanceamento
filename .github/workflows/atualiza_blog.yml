name: Atualiza blog

on:
  schedule:
    # Executa todos os dias úteis às 23:00 UTC (20:00 BRT), após fechamento da B3
    - cron: '5 22 * * 1-5'

  workflow_dispatch:  # Permite execução manual

permissions:
  contents: write

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
#      - name: Install dependencies
#        run: |
#          python -m pip install --upgrade pip
#          python -m pip install -r requirements.txt
      
      - name: atualiza blog
        run: python update_blog.py
      
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add docs/blog/posts.json docs/blog/posts/*.html
          git commit -m "Blog updated with latest posts - $(date +'%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"
          git push
