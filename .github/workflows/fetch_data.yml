name: Fetch Market Data

on:
  schedule:
    # Executa todos os dias úteis às 23:00 UTC (20:00 BRT), após fechamento da B3
    - cron: '5 22 * * 1-5'

  workflow_dispatch:  # Permite execução manual

permissions:
  contents: write

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas g4f
      
      - name: Fetch market data
        run: python scripts/data_fetcher.py

      - name: Generate market summary
        run: python scripts/market_summary.py

      - name: Generate AI News and Insights
        run: python scripts/news_fetcher.py
        env:
          GAS_URL: ${{ secrets.GAS_URL }}
      
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/market_data.json data/market_summary.json data/market_summary.md data/market_news.json
          git commit -m "Update market data, summary and AI insights - $(date +'%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"
          git push
