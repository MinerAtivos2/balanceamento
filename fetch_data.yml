name: Fetch Market Data

on:
  schedule:
    # Executa todos os dias às 18:00 (após fechamento da B3)
    - cron: '0 18 * * 1-5'
  workflow_dispatch:  # Permite execução manual

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Fetch market data
        run: python scripts/data_fetcher.py
      
      - name: Analyze portfolio
        run: python scripts/portfolio_analyzer.py
      
      - name: Calculate rebalancing
        run: python scripts/rebalancer.py
      
      - name: Calculate price ceiling (Barsi)
        run: python scripts/barsi_calculator.py
      
      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/*.json
          git commit -m "Update market data - $(date +'%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"
          git push
